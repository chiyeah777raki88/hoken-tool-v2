// 起動時に既存セッションがあれば自動ログイン
function sbRestore(cb){
  if(!sbInit()){cb&&cb();return;}
  try{
    sbClient.auth.getSession().then(async function(r){
      if(r&&r.data&&r.data.session){sbUser=r.data.session.user;SYNC_ON=true;await sbLoadApiKey();}
      cb&&cb();
    },function(){cb&&cb();});
  }catch(e){cb&&cb();}
}

function scanBasic(files,setMsg,onReflect){
  if(!AI_API_KEY){setMsg("右上の「🔑鍵」から登録を。","#c0392b");return;}
  setMsg(files.length+"枚 解析中…（10〜30秒）","#8089a0");
  var imgs=[];var done=0;
  files.forEach(function(f,idx){var r=new FileReader();r.onload=function(){imgs[idx]={type:"image",source:{type:"base64",media_type:(f.type||"image/jpeg"),data:String(r.result).split(",")[1]}};done++;if(done===files.length)go();};r.onerror=function(){done++;if(done===files.length)go();};r.readAsDataURL(f);});
  function go(){
    var content=imgs.filter(Boolean).concat([{type:"text",text:SCAN_PROMPT}]);
    fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true","x-api-key":AI_API_KEY},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:4000,messages:[{role:"user",content:content}]})})
    .then(function(res){return res.json();})
    .then(function(d){
      if(d&&d.error){setMsg("エラー："+(d.error.message||"").slice(0,120),"#c0392b");alert("読み取りエラー：\n"+(d.error.message||JSON.stringify(d.error)));return;}
      var txt=(d&&d.content&&d.content[0]&&d.content[0].text)||"";
      if(!txt){setMsg("応答が空でした。","#c0392b");alert("応答が空でした。画像を減らすか、もう一度お試しください。");return;}
      var js=txt.replace(/```json/g,"").replace(/```/g,"").trim();
      var parsed=null;try{parsed=JSON.parse(js);}catch(e){var m=js.match(/\{[\s\S]*\}/);if(m){try{parsed=JSON.parse(m[0]);}catch(e2){}}}
      if(!parsed){setMsg("解析に失敗。","#c0392b");alert("読み取り結果をうまく変換できませんでした。\n\nAIの返答（先頭）:\n"+txt.slice(0,300));return;}
      setMsg("✓ 読み取り完了。確認画面へ。","#27ae60");
      showScanConfirm(parsed,onReflect);
    })
    .catch(function(e){setMsg("通信エラー："+e.message,"#c0392b");alert("通信エラー："+e.message);});
  }
}

// 読み取りJSON → 現在の証券へ反映
function reflectBasic(d,covs,fvs){
  var p=curPol();
  if(d.company&&String(d.company).trim()){p.company=d.company;p.companySel=(COS.indexOf(d.company)>=0?d.company:"その他");}
  if(d.insType&&ITS.indexOf(d.insType)>=0)p.insType=d.insType;else if(d.insType&&String(d.insType).trim())p.insType="その他";
  if(d.planName&&String(d.planName).trim())p.planName=d.planName;
  if(d.mainEndAge!=null&&String(d.mainEndAge).trim()){if(String(d.mainEndAge).indexOf("終身")>=0){p.mainEndWhole=true;p.mainEndAge="";}else{p.mainEndWhole=false;p.mainEndAge=String(d.mainEndAge).replace(/[^0-9]/g,"");}}
  if(d.payToAge!=null&&String(d.payToAge).trim()){if(String(d.payToAge).indexOf("終身")>=0){p.payToWhole=true;p.payToAge="";}else{p.payToWhole=false;p.payToAge=String(d.payToAge).replace(/[^0-9]/g,"");}}
  if(d.premium!=null&&String(d.premium).trim())p.premium=String(d.premium).replace(/[^0-9.]/g,"");
  if(d.contractDate&&String(d.contractDate).trim()){p.contractDate=String(d.contractDate).trim();var insP2=personByLabel(p.insured);var ea=ageAtDate(insP2,p.contractDate);if(ea!=null)p.entryAge=ea;}
  if(d.payFreq&&PAY_FREQ.indexOf(d.payFreq)>=0)p.payFreq=d.payFreq;
  if(d.currency){var cm={JPY:"JPY（円）",USD:"USD（米ドル）",EUR:"EUR（ユーロ）",AUD:"AUD（豪ドル）"};if(cm[d.currency])p.currency=cm[d.currency];}
  if(d.payMethod&&PAY_METHOD.indexOf(d.payMethod)>=0)p.payMethod=d.payMethod;
  if(d.contractType==="法人"){p.contractType="法人";if(d.corpName)p.corpName=d.corpName;}else if(d.contractType==="個人")p.contractType="個人";
  // 保障の反映：COV_PRESETSのカテゴリに一致するものをitemsへ
  if(covs&&covs.length){
    if(!p.items)p.items=[];
    covs.forEach(function(c){
      var idx=-1;for(var i=0;i<COV_PRESETS.length;i++){if(COV_PRESETS[i].t===c.type){idx=i;break;}}
      if(idx<0)return;
      // itemsをCOV_PRESETSのindexに合わせて確保
      if(!p.items[idx])p.items[idx]={on:false,trigger:COV_PRESETS[idx].t,triggerFree:"",req1:"",req2:"",periodType:"主契約と同じ",endAge:"",payPeriod:"主契約と同じ",payEndAge:"",amount:"",amount2:"",amountType:"一時金(万)",freq:"1回",interval:"",premium:""};
      var it=p.items[idx];it.on=true;
      if(c.amount!=null&&String(c.amount).trim())it.amount=String(c.amount).replace(/[^0-9.]/g,"");
      if(c.amount2!=null&&String(c.amount2).trim())it.amount2=String(c.amount2).replace(/[^0-9.]/g,"");
      if(c.amountType&&AMT_TYPES.indexOf(c.amountType)>=0)it.amountType=c.amountType;
      if(c.note&&String(c.note).trim())it.req1=c.note;
    });
  }
  // 将来予測の反映（金額は小数を丸める）
  if(fvs&&fvs.length){
    function rd(v){if(v==null||v==="")return "";var n=+v;return isNaN(n)?"":Math.round(n);}
    p.hasCashValue=true;p.futureVals=fvs.map(function(r){return {age:(r.age!=null?String(r.age).replace(/[^0-9]/g,""):""),paid:rd(r.paid),val:rd(r.val),v3:rd(r.v3),v45:rd(r.v45),v6:rd(r.v6)};});
  }
  saveState();render();
}
