<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>保険ツール v2</title>
<style>
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:#eef1f6;color:#1a2744;font-size:14px;}
.hdr{background:#1a2744;color:#fff;padding:10px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10;}
.hdr .ttl{color:#e8c977;font-weight:700;font-size:14px;}
.hdr .ver{margin-left:auto;color:#c9a84c;font-weight:700;font-size:11px;}
.wrap{max-width:900px;margin:0 auto;padding:12px;}
.card{background:#fff;border:1px solid #e3e3e3;border-radius:8px;padding:12px;margin-bottom:12px;}
.tbl-scroll{overflow-x:auto;border:1px solid #c9ced8;border-radius:6px;}
table.cov{width:100%;border-collapse:collapse;font-size:11px;min-width:670px;table-layout:fixed;}
table.cov th,table.cov td{border:1px solid #d8dde6;padding:4px 4px;text-align:left;overflow:hidden;}
table.cov th{background:#f1f4f9;font-weight:700;text-align:center;}
table.cov td.c{text-align:center;}
table.cov td.r{text-align:right;}
table.cov tr.off td{color:#aaa;background:#fafafa;}
input,select{font-size:11px;padding:3px 4px;border:1px solid #c9ced8;border-radius:4px;width:100%;max-width:100%;box-sizing:border-box;background:#fff;}
table.cov select{padding-right:2px;}
input[type=checkbox]{width:auto;transform:scale(1.2);}
.btn{background:#1a2744;color:#fff;border:none;border-radius:5px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;}
.btn.gold{background:#c9a84c;}
.muted{color:#8a8a8a;font-size:11px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
var APP_VERSION="v2-0617-1640";
window.onerror=function(msg,src,line){if(!msg||msg==="Script error."||!line||line===0){return true;}var a=document.getElementById('app');if(a&&(!a.innerHTML||a.innerHTML.trim().length<50)){a.innerHTML='<div style="padding:20px;color:#c0392b;">エラー: '+msg+'<br>行: '+line+'<br><button onclick="location.reload()">再読み込み</button></div>';}return true;};

 {t:"退院一時金",r1:["入院日数の条件なし","所定の入院日数以上"]},

 {t:"がん診断一時金",r1:["上皮内がん含む","上皮内がんは減額","悪性のみ"]},

 {t:"脳血管疾患",r1:["脳卒中のみ","脳血管疾患全般"],r2:["60日所定","入院1日","入院10日","入院20日","診断で即時"]},

function letterOf(i){return String.fromCharCode(65+i);}

function loadState(){try{var s=localStorage.getItem("hoken_v2_state");if(s)return JSON.parse(s);}catch(e){}return null;}
function saveState(){try{localStorage.setItem("hoken_v2_state",JSON.stringify(STATE));}catch(e){}}

function newPolicy(idx){return {company:"",companySel:"",planName:"",insType:"",mainEndAge:"",color:POL_COLORS[idx%POL_COLORS.length],premium:"",payFreq:"月払",payMethod:"口座振替",currency:"JPY（円）",payToAge:"",contractor:"本人",insured:"本人",items:[]};}

var STATE=loadState();
// 旧（単一証券）データからの移行
if(STATE&&!STATE.policies){
  var mig=newPolicy(0);mig.company=STATE.company||"";mig.planName=STATE.planName||"";mig.mainEndAge=STATE.mainEndAge||"";mig.items=STATE.items||[];
  STATE={custName:STATE.custName||"",self:{era:"西暦",y:"",m:"",d:""},family:[],policies:[mig],cur:0};
}
if(!STATE){STATE={custName:"",self:{era:"西暦",y:"",m:"",d:""},family:[],policies:[newPolicy(0)],cur:0};}
if(!STATE.self)STATE.self={era:"西暦",y:"",m:"",d:""};
if(!STATE.family)STATE.family=[];
if(!STATE.policies||!STATE.policies.length)STATE.policies=[newPolicy(0)];
if(STATE.cur===undefined||STATE.cur>=STATE.policies.length)STATE.cur=0;

function curPol(){return STATE.policies[STATE.cur];}
function peopleList(){var arr=["本人"];STATE.family.forEach(function(f){if(f.label&&f.label!=="本人")arr.push(f.label);});return arr;}

function el(t,c,x){var e=document.createElement(t);if(c)e.className=c;if(x!==undefined)e.textContent=x;return e;}

function getItem(i){
 var pol=curPol();if(!pol.items)pol.items=[];
 if(!pol.items[i])pol.items[i]={on:false,trigger:COV_PRESETS[i].t,triggerFree:"",req1:"",req2:"",periodType:"主契約と同じ",endAge:"",payPeriod:"主契約と同じ",payEndAge:"",amount:"",amount2:"",amountType:"一時金(万)",freq:"1回",interval:"",premium:""};
 var _it=pol.items[i];if(_it.req1===undefined)_it.req1=_it.req||"";if(_it.req2===undefined)_it.req2="";if(_it.periodType===undefined)_it.periodType=(_it.endAge?"歳指定":"主契約と同じ");
 return pol.items[i];
}

function render(){
 var app=document.getElementById("app");app.innerHTML="";
 var hdr=el("div","hdr");
 hdr.appendChild(el("span","ttl","保険ツール v2"));
 if(STATE.custName){var nm=el("span",null,STATE.custName+" 様");nm.style.fontSize="12px";hdr.appendChild(nm);}

 app.appendChild(hdr);

 var wrap=el("div","wrap");

 // お客様・家族
 var c0=el("div","card");

 c0.appendChild(labeledBlock("ご本人の生年月日",birthInput(STATE.self,function(){saveState();})));
 var fh=el("div");fh.style.cssText="font-weight:700;margin:8px 0 4px;font-size:13px;";fh.textContent="家族（続柄・年齢）";c0.appendChild(fh);
 var fnote=el("p","muted","配偶者やお子様などの続柄を選び、現在の年齢を入れます（本人は上の年齢を使います）。タイムラインの下に年齢が並びます。");c0.appendChild(fnote);
 var fwrap=el("div");
 function renderFam(){
   fwrap.innerHTML="";
   STATE.family.forEach(function(f,fi){
     var REL=["配偶者","子","父","母","その他"];
     var row=el("div");row.style.cssText="display:grid;grid-template-columns:1fr 1.6fr auto;gap:8px;align-items:flex-end;margin-bottom:6px;";
     var relSelVal=(REL.indexOf(f.label)>=0)?f.label:(f.label?"その他":"");

     if(f._other||(f.label&&REL.indexOf(f.label)<0)){var fr=inp("text",(f.label===" "?"":f.label)||"",function(v){f.label=v;f._free=v;saveState();});fr.placeholder="続柄を入力";fr.style.marginTop="4px";relCell.appendChild(fr);}
     row.appendChild(relCell);
     row.appendChild(labeled("生年月日",birthInput(f,function(){saveState();})));
     var del=el("button","btn","×");del.style.cssText="height:32px;padding:0 10px;";del.addEventListener("click",function(){STATE.family.splice(fi,1);saveState();renderFam();});
     row.appendChild(del);
     fwrap.appendChild(row);
   });
 }
 renderFam();
 c0.appendChild(fwrap);
 var addF=el("button","btn","＋ 家族を追加");addF.addEventListener("click",function(){STATE.family.push({label:"配偶者",era:"西暦",y:"",m:"",d:""});saveState();renderFam();});
 c0.appendChild(addF);
 wrap.appendChild(c0);

 // 証券タブ（切替・追加）

 var tabs=el("div");tabs.style.cssText="display:flex;flex-wrap:wrap;gap:6px;";
 STATE.policies.forEach(function(p,pi){
   var t=el("button","btn",letterOf(pi)+(p.company?("："+p.company):""));
   t.style.cssText="padding:6px 10px;border-left:5px solid "+p.color+";"+(pi===STATE.cur?"background:var(--color-background-secondary);font-weight:700;":"");
   t.addEventListener("click",function(){STATE.cur=pi;saveState();render();});
   tabs.appendChild(t);
 });
 var addP=el("button","btn gold","＋ 証券を追加");addP.style.padding="6px 10px";
 addP.addEventListener("click",function(){STATE.policies.push(newPolicy(STATE.policies.length));STATE.cur=STATE.policies.length-1;saveState();render();});
 tabs.appendChild(addP);
 tabBar.appendChild(tabs);
 wrap.appendChild(tabBar);

 // 現在の証券の基本情報
 var pol=curPol();
 var c1=el("div","card");
 var pinfo=el("div");pinfo.style.cssText="font-weight:700;margin-bottom:8px;";pinfo.textContent="証券 "+letterOf(STATE.cur)+" の情報";c1.appendChild(pinfo);
 // 契約者・被保険者（登録済みの人から選択）
 var ppl=peopleList();
 var prow=el("div");prow.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;";

 c1.appendChild(prow);
 // 保険会社（選択＋その他自由入力）
 var coVal=(COS.indexOf(pol.companySel)>=0?pol.companySel:(pol.company?"その他":""));

 if(pol.companySel==="その他"){c1.appendChild(labeledBlock("保険会社（自由入力）",inp("text",pol.company||"",function(v){pol.company=v;saveState();})));}
 // 保険種類
 c1.appendChild(labeledBlock("保険種類",mkSel([""].concat(ITS),(ITS.indexOf(pol.insType)>=0?pol.insType:""),function(v){pol.insType=v;saveState();})));

 var crowB=el("div");crowB.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;";

 c1.appendChild(crow2);

 // 保障内容一覧（現在の証券）

 ["該当","給付事由","要件・条件","保険期間","払込期間","給付金額","種類","回数","特約保険料"].forEach(function(t){thead.appendChild(el("th",null,t));});

function labeled(label,inputEl){var d=el("div");var l=el("div","muted",label);l.style.marginBottom="2px";d.appendChild(l);d.appendChild(inputEl);return d;}
function inp(type,val,onCh){var i=document.createElement("input");i.type=type||"text";i.value=val||"";i.addEventListener("input",function(){onCh(this.value);});return i;}
function field(label,val,onCh,type){var d=el("div");d.style.marginBottom="8px";var l=el("div","muted",label);l.style.marginBottom="2px";d.appendChild(l);d.appendChild(inp(type,val,onCh));return d;}
function mkSel(opts,val,onCh){var s=document.createElement("select");opts.forEach(function(o){var op=document.createElement("option");op.value=o;op.textContent=(o===""?"（選択）":o);if(o===val)op.selected=true;s.appendChild(op);});s.addEventListener("change",function(){onCh(this.value);});return s;}

var ERA_BASE={"昭和":1925,"平成":1988,"令和":2018};
function eraToWest(era,y){y=parseInt(y);if(!y)return null;if(era==="西暦")return y;return (ERA_BASE[era]||0)+y;}
function ageFromBirth(b){if(!b)return null;var wy=eraToWest(b.era,b.y);if(!wy||!b.m||!b.d)return null;var t=new Date();var a=t.getFullYear()-wy;var mm=t.getMonth()+1;if(mm<parseInt(b.m)||(mm===parseInt(b.m)&&t.getDate()<parseInt(b.d)))a--;return a;}
function birthInput(obj,onCh){
 if(!obj.era)obj.era="西暦";
 var w=el("div");w.style.cssText="display:flex;align-items:center;gap:3px;flex-wrap:nowrap;";
 var era=mkSel(["西暦","昭和","平成","令和"],obj.era,function(v){obj.era=v;onCh();upd();});era.style.cssText="width:64px;flex:none;";
 function num(val,ph,max,len,next){var i=document.createElement("input");i.type="tel";i.inputMode="numeric";i.value=val||"";i.placeholder=ph;i.maxLength=len;i.style.cssText="width:"+(len>2?54:38)+"px;flex:none;text-align:center;";i.addEventListener("input",function(){this.value=this.value.replace(/[^0-9]/g,"");if(this.value.length>=len&&next&&next())next().focus();onChVal();});return i;}
 var yi,mi,di,ageSpan;
 function onChVal(){obj.y=yi.value;obj.m=mi.value;obj.d=di.value;onCh();upd();}
 function upd(){var a=ageFromBirth(obj);ageSpan.textContent=(a!=null?("（"+a+"歳）"):"");}
 yi=num(obj.y,"年",9999,4,function(){return mi;});
 mi=num(obj.m,"月",12,2,function(){return di;});
 di=num(obj.d,"日",31,2,null);
 ageSpan=el("span","muted","");ageSpan.style.cssText="font-size:11px;white-space:nowrap;";
 w.appendChild(era);w.appendChild(yi);w.appendChild(el("span","muted","/"));w.appendChild(mi);w.appendChild(el("span","muted","/"));w.appendChild(di);w.appendChild(ageSpan);
 upd();
 return w;
}

 var freqLabel=function(it){if(!it.freq)return "";var x=it.freq;if((it.freq==="複数回"||it.freq==="各々複数回")&&it.interval)x+="・"+it.interval;return esc(x);};
 var premLabel=function(it){return it.premium?(esc(Number(it.premium).toLocaleString())+" 円"):"";};
 var amtNum=function(it){if(it.amount&&it.amount2){return "入院 "+esc(Number(it.amount).toLocaleString())+" / 外来 "+esc(Number(it.amount2).toLocaleString());}if(!it.amount)return "";return esc(Number(it.amount).toLocaleString());};
 var trs=rows.map(function(it){return "<tr><td>"+esc(it.triggerFree||it.trigger)+"</td><td>"+reqLabel(it)+"</td><td style='text-align:center'>"+periodLabel(it)+"</td><td style='text-align:right'>"+amtNum(it)+"</td><td style='text-align:center'>"+esc(it.amountType||"")+"</td><td style='text-align:center'>"+freqLabel(it)+"</td><td style='text-align:right'>"+premLabel(it)+"</td></tr>";}).join("");

 w.document.write('<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><title>保障内容一覧表</title>'+

 '<h1>保障内容一覧表<small>'+esc(ds)+' 作成</small></h1>'+
 '<div class="sub">'+esc(STATE.custName||"")+(STATE.custName?" 様":"")+(pol.company?(" ／ "+esc(pol.company)):"")+(pol.planName?("　"+esc(pol.planName)):"")+'</div>'+
 '<table><tr><th>給付事由</th><th>要件・条件</th><th style="text-align:center">保険期間</th><th style="text-align:right">給付金額</th><th style="text-align:center">種類</th><th style="text-align:center">回数・支払</th><th style="text-align:right">特約保険料</th></tr>'+trs+'</table>'+
 '<div class="ft">保険ツール v2</div>'+
 '<div class="noprint" style="margin-top:16px;text-align:center;"><button onclick="window.print()" style="padding:8px 18px;font-size:13px;">印刷 / PDF保存</button></div>'+
 '</body></html>');

}
