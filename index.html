  ov.appendChild(box);document.body.appendChild(ov);

// 起動時に既存セッションがあれば自動ログイン
function sbRestore(cb){
  if(!sbInit()){cb&&cb();return;}
  try{
    sbClient.auth.getSession().then(async function(r){
      if(r&&r.data&&r.data.session){sbUser=r.data.session.user;SYNC_ON=true;await sbLoadApiKey();}
      cb&&cb();
    },function(){cb&&cb();});
  }catch(e){cb&&cb();}
}

// 払込回数から月額換算（通貨はそのまま・概算）
function premToMonthly(p){
  var v=+p.premium||0;if(!v)return 0;
  switch(p.payFreq){
    case "月払":return v;
    case "半年払":return v/6;
    case "年払":return v/12;
    case "一時払":return 0; // 月次負担なし
    case "前納":return 0;
    default:return v;
  }
}
