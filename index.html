<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%;}
body{font-family:system-ui,-apple-system,sans-serif;background:#faf8f3;color:#1a2744;font-size:13px;}
.hdr{background:#1a2744;color:white;padding:6px 14px;display:flex;justify-content:space-between;align-items:center;font-size:11px;border-bottom:3px solid #c9a84c;}
.tabs{display:flex;background:#1a2744;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab-btn{padding:10px 12px;background:transparent;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:11px;font-weight:500;border-bottom:3px solid transparent;white-space:nowrap;font-family:inherit;}
.tab-btn.active{color:#c9a84c;border-bottom:3px solid #c9a84c;}
.content{padding:12px 16px;max-width:100%;margin:0;}
.sec{background:white;border-radius:8px;border:1px solid #ddd8cc;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.sec-hdr{background:#1a2744;color:white;padding:9px 14px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.sec-body{padding:14px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:600px){.g3,.g4{grid-template-columns:1fr 1fr;}.g2{grid-template-columns:1fr;}}
.fl{display:flex;flex-direction:column;gap:3px;font-size:11px;color:#8a8a8a;font-weight:500;}
input,select,textarea{border:1px solid #ddd8cc;border-radius:4px;padding:6px 9px;font-family:inherit;font-size:12px;color:#1a2744;background:white;width:100%;}
input[type=checkbox],input[type=radio]{width:auto;min-width:0;flex:none;transform:scale(1.2);cursor:pointer;padding:0;margin:0;}
textarea{resize:vertical;min-height:56px;}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;}
.bn{background:#1a2744;color:white;}.bg{background:#c9a84c;color:#1a2744;}.br{background:#c0392b;color:white;}.bv{background:#27ae60;color:white;}
.ptabs{background:#f0eff0;border-bottom:1px solid #ddd8cc;padding:0 12px;display:flex;align-items:center;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;min-height:42px;}
.ptab{padding:7px 14px;border:1px solid #ddd8cc;border-bottom:none;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;font-weight:500;background:white;color:#1a2744;white-space:nowrap;}
.ptab.active{background:#1a2744;color:white;}
.poltabs{display:flex;gap:4px;padding:10px 14px;background:#f8f7f4;border-bottom:1px solid #ddd8cc;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.poltab{padding:5px 14px;border:1px solid #ddd8cc;border-radius:20px;cursor:pointer;font-size:11px;background:white;color:#1a2744;white-space:nowrap;}
.poltab.active{background:#1a2744;color:white;}
.rg{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.rb{padding:4px 10px;border:1px solid #ddd8cc;border-radius:20px;cursor:pointer;font-size:11px;background:white;color:#1a2744;}
.rb.active{background:#1a2744;color:white;border-color:#1a2744;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:#1a2744;color:white;padding:6px 8px;text-align:left;font-weight:500;white-space:nowrap;}
td{padding:5px 8px;border-bottom:1px solid #ddd8cc;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
table.kanyu{table-layout:fixed;width:100%;}
table.kanyu th,table.kanyu td{border:1px solid #ccc;text-align:center;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;padding:4px 4px;}
table.kanyu td:first-child,table.kanyu th:first-child{text-align:center;}
table.cmpct td,table.cmpct th{padding:2px 4px;}
table.cmpct td:first-child,table.cmpct th:first-child{text-align:left;}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cam{padding:12px;background:#f0f4ff;border-radius:8px;margin-bottom:12px;}
.cbox{border-top:2px solid #c9a84c;background:white;}
.chdr{background:#c9a84c;color:#1a2744;padding:8px 14px;font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.cbody{padding:12px;max-height:350px;overflow-y:auto;}
.cgrp{margin-bottom:10px;}
.cgtitle{font-size:11px;font-weight:700;color:#1a2744;border-bottom:1px solid #ddd8cc;padding-bottom:3px;margin-bottom:6px;}
.cfields{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.cf label{font-size:10px;color:#8a8a8a;}
.hi label{color:#856404 !important;font-weight:700 !important;}
.hi input{border-color:#f39c12 !important;background:#fffde7 !important;}
.cnote{padding:6px 12px;background:#fffde7;border-top:1px solid #ddd8cc;font-size:11px;color:#856404;}
.tooltip-popup{position:fixed;bottom:20px;left:10px;right:10px;background:#1a2744;color:white;padding:12px 16px;border-radius:8px;font-size:12px;z-index:9999;line-height:1.6;box-shadow:0 4px 20px rgba(0,0,0,.4);}
@media print {
* { visibility: hidden !important; }
#print-overlay { display: block !important; position: fixed !important; top: 0 !important; left: 0 !important; width: 297mm !important; min-height: 210mm !important; background: white !important; z-index: 9999999 !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
#print-overlay * { visibility: visible !important; }
#print-overlay .no-print { display: none !important; }
#print-overlay table { page-break-inside: avoid; }
@page { size: A4 landscape; margin: 6mm; }
}
#print-area { display: none; }
</style>

function ensureCell(data,ck,defText){
if(!data[ck]){
data[ck]=mkCell(defText,[],false);
} else {
// migrate old polIdx (single) to polIdxs (array)
if(data[ck].polIdx!==undefined&&data[ck].polIdxs===undefined){
data[ck].polIdxs=data[ck].polIdx>=0?[data[ck].polIdx]:[];
delete data[ck].polIdx;
}
if(!data[ck].polIdxs)data[ck].polIdxs=[];
}
return data[ck];
}

function autoAssign(){
function setDot(data,tt,rid,cid,pi){var ck=tt+"|"+rid+"|"+cid;var cd=data[ck];if(!cd){cd=mkCell("",[],false);data[ck]=cd;}if(!cd.polIdxs)cd.polIdxs=[];cd.na=false;if(cd.polIdxs.indexOf(pi)<0)cd.polIdxs.push(pi);}
function condCol(c){var m={A:"a",W:"g",H:"b",T:"c",B:"d",E:"e",C:"f",D:"e"};return m[c]||"a";}
var K=state.bigMatrixData.kyufu,M=state.bigMatrixData.menjo;
["cancer","heart","brain","dis","care","dis_grade","welfare","diabetes","hypertension","liver","kidney","pancreas"].forEach(function(rid){Object.keys(K).forEach(function(ck){if(ck.split("|")[1]===rid)K[ck].polIdxs=[];});});
["m_cancer","m_heart","m_brain","m_care"].forEach(function(rid){Object.keys(M).forEach(function(ck){if(ck.split("|")[1]===rid)M[ck].polIdxs=[];});});
policies.forEach(function(p,pi){
if(p.cancerOn||(+p.c1st>0)){var cCol=(p.cCond==="B")?"c":"b";if(+p.c1st>0)setDot(K,"kyufu","cancer",cCol,pi);if(+p.cancerHosp>0)setDot(K,"kyufu","cancer","f",pi);if(+p.cancerOut2>0)setDot(K,"kyufu","cancer","g",pi);}
if(p.bigOn&&+p.h1st>0)setDot(K,"kyufu","heart",condCol(p.hCond),pi);
if(p.bigOn&&+p.b1st>0)setDot(K,"kyufu","brain",condCol(p.bCond),pi);
if(p.disType&&p.disType!=="none"){var ds=p.disScope||"5big";var dcol=(ds==="7big")?"b":(ds==="all"||ds==="grade2")?"c":"a";setDot(K,"kyufu","dis",dcol,pi);}
if(p.careType&&p.careType!=="none"){var cl=p.careLevel||"";var ccol=(cl.indexOf("1以上")>=0)?"d":(cl.indexOf("3以上")>=0)?"b":(cl.indexOf("所定")>=0)?"a":"c";setDot(K,"kyufu","care",ccol,pi);}
if(p.cancer2ndCond&&p.cancer2ndCond!==""){var s2c=({none:"s1","2y":"s2","1y":"s3",out:"s4"})[p.cancer2ndCond];if(s2c)setDot(K,"kyufu","cancer",s2c,pi);}
if(+p.big8Amount>0){var b8c=({days60:"a",days20:"c",days10:"d",hospital1:"f",surgery:"e",any:"f"})[p.big8Cond]||"a";["diabetes","hypertension","liver","kidney","pancreas"].forEach(function(rid){setDot(K,"kyufu",rid,b8c,pi);});}
if(+p.disPensionAmt>0&&p.disPensionGrade){var gco=({ "1級":"a","2級":"b","3級":"c","4級":"d"})[p.disPensionGrade];if(gco)setDot(K,"kyufu","dis_grade",gco,pi);}
if(+p.welfareAmt>0&&p.welfareGrade){var wco=({ "1級":"a","2級":"b","3級":"c","4級":"d"})[p.welfareGrade];if(wco)setDot(K,"kyufu","welfare",wco,pi);}
var et=p.premExemptType;
if(et&&et!=="none"&&et!==""){var det=p.premExemptDetail||"";
function mjCol(){if(det.indexOf("60日")>=0)return "a";if(det.indexOf("20日")>=0)return "c";if(det.indexOf("10日")>=0)return "d";if(det.indexOf("手術")>=0)return "e";return "f";}
var cCol2=(det.indexOf("上皮内")>=0||p.cCond==="B")?"c":"b";
if(et==="cancer")setDot(M,"menjo","m_cancer","b",pi);
else if(et==="cancer_jhi")setDot(M,"menjo","m_cancer","c",pi);
else if(et==="3big"||et==="5big"||et==="8big"||et==="multi"){setDot(M,"menjo","m_cancer",cCol2,pi);setDot(M,"menjo","m_heart",mjCol(),pi);setDot(M,"menjo","m_brain",mjCol(),pi);}
else if(et==="care")setDot(M,"menjo","m_care","c",pi);}
});
saveState();
}

var exportSelfBtn=el("button");exportSelfBtn.textContent="💾保存して書き出し";
exportSelfBtn.style.cssText="font-size:10px;padding:3px 7px;background:#c0392b;color:white;border:none;border-radius:4px;cursor:pointer;font-weight:800;white-space:nowrap;";
exportSelfBtn.title="今の全データを埋め込んだ最新ファイルを書き出します。次回これを開けば最新が出ます。";
exportSelfBtn.addEventListener("click",function(){
  try{
    // 現在の全データ（ins_customer_ 系 + current）を集める
    var dump={};
    Object.keys(_cache).forEach(function(k){
      if(k.indexOf("ins_customer_")===0||k==="kudo_current_customer"){dump[k]=_cache[k];}
    });
    var b64=btoa(unescape(encodeURIComponent(JSON.stringify(dump))));
    // 現在のHTML全体を取得し、SEED_B64を新データで差し替え
    var htmlText="<!DOCTYPE html>\n"+document.documentElement.outerHTML;
    // window.__SEED_B64 を新しい値に設定する行を先頭に注入（既存のSEED_B64定義より優先）
    htmlText=htmlText.replace(/window\.__SEED_B64=window\.__SEED_B64\|\|"[^"]*";/, 'window.__SEED_B64="'+b64+'";');
    // 起動時にこのデータで強制適用するため、バージョン印も新しくする
    var stamp="save_"+Date.now();
    htmlText=htmlText.replace(/var SEED_VER="[^"]*";/, 'var SEED_VER="'+stamp+'";');
    var blob=new Blob([htmlText],{type:"text/html"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    var d=new Date();var pad=function(n){return(n<10?"0":"")+n;};
    a.href=url;a.download="保険ツール_"+pad(d.getMonth()+1)+pad(d.getDate())+"_"+pad(d.getHours())+pad(d.getMinutes())+".html";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
    alert("最新データを埋め込んだファイルを書き出しました。\n次回からは、この新しいファイルを開いてください。");
  }catch(e){alert("書き出しエラー："+e.message);}
});

    put("ins_customer_list",JSON.stringify(curList));
    ["ins_customer_c1780451419448","ins_customer_c1780051002795","ins_customer_c1781226480668"].forEach(function(k){
      var cur=_cache[k];var hasPol=false;
      try{hasPol=(JSON.parse(cur).polSave.m1.length>0);}catch(e){}
      if(!hasPol)put(k,seed[k]);
    });
    alert("4名のデータを復元しました。画面を更新します。");
    location.reload();
  }catch(e){alert("復元エラー："+e.message);}
});

}).catch(function(){});
}
});
currentCustomerId=origId;
},1500);
}
}
function restoreAndInit(data){
if(data){Object.keys(data).forEach(function(k){try{storageSet(k,data[k]);}catch(e){}});}
state=loadState();
doInit();
// データ読込完了後に全データをwindow.storageに再保存
if(window.storage&&window.storage.set&&data&&Object.keys(data).length>0){
var keys=Object.keys(data);
var saved=0;
keys.forEach(function(k){
window.storage.set(k,data[k]).then(function(){
saved++;
if(saved===keys.length){
var si=document.getElementById("save-ind");
if(si){si.textContent="☁"+saved+"件同期";si.style.color="#7c3aed";}
}
}).catch(function(){saved++;});
});
}
}
try{
if(window.storage&&typeof window.storage.list==="function"){
Promise.resolve(window.storage.list()).then(function(kr){
var ks=(kr&&kr.keys)||[];
var ik=ks.filter(function(k){return k.indexOf("ins_")==0||k.indexOf("kudo_")==0;});
if(ik.length===0){return Promise.resolve(window.storage.get("hoken_backup")).then(function(r){restoreAndInit(r&&r.value?JSON.parse(r.value):null);});}
return Promise.all(ik.map(function(k){return Promise.resolve(window.storage.get(k));})).then(function(rs){var m={};rs.forEach(function(r,i){if(r&&r.value!==undefined)m[ik[i]]=r.value;});restoreAndInit(Object.keys(m).length?m:null);});
}).catch(function(){doInit();});
} else if(window.storage&&typeof window.storage.get==="function"){
var storagePromise;
try{storagePromise=Promise.resolve(window.storage.get("hoken_backup"));}catch(e){storagePromise=null;}
if(storagePromise){
storagePromise.then(function(result){
try{
if(result&&result.value){
try{
var data=JSON.parse(result.value);
Object.keys(data).forEach(function(k){
try{storageSet(k,data[k]);}catch(e){}
});
state=loadState();
}catch(e){}
}
}catch(e){}
doInit();
}).catch(function(){doInit();});
} else {doInit();}
} else {doInit();}
}catch(e){doInit();}
} // end startApp
