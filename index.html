<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保険証券管理ツール サーバー版（同期）</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a2744">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="保険ツール">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%;}
body{font-family:system-ui,-apple-system,sans-serif;background:#faf8f3;color:#1a2744;font-size:13px;}
.hdr{background:#1a2744;color:white;padding:6px 14px;display:flex;justify-content:space-between;align-items:center;font-size:12px;border-bottom:3px solid #c9a84c;}
.tabs{display:flex;background:#1a2744;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab-btn{padding:10px 12px;background:transparent;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:12px;font-weight:500;border-bottom:3px solid transparent;white-space:nowrap;font-family:inherit;}
.tab-btn.active{color:#c9a84c;border-bottom:3px solid #c9a84c;}
.content{padding:12px 16px;max-width:100%;margin:0;}
.sec{background:white;border-radius:8px;border:1px solid #ddd8cc;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.sec-hdr{background:#1a2744;color:white;padding:9px 14px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.sec-body{padding:14px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:600px){.g3,.g4{grid-template-columns:1fr 1fr;}.g2{grid-template-columns:1fr;}}
.fl{display:flex;flex-direction:column;gap:3px;font-size:12px;color:#8a8a8a;font-weight:500;}
input,select,textarea{border:1px solid #ddd8cc;border-radius:4px;padding:6px 9px;font-family:inherit;font-size:12px;color:#1a2744;background:white;width:100%;}
input[type=checkbox],input[type=radio]{width:auto;min-width:0;flex:none;transform:scale(1.2);cursor:pointer;padding:0;margin:0;}
textarea{resize:vertical;min-height:56px;}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;}
.bn{background:#1a2744;color:white;}.bg{background:#c9a84c;color:#1a2744;}.br{background:#c0392b;color:white;}.bv{background:#27ae60;color:white;}
.ptabs{background:#f0eff0;border-bottom:1px solid #ddd8cc;padding:0 12px;display:flex;align-items:center;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;min-height:42px;}
.ptab{padding:7px 14px;border:1px solid #ddd8cc;border-bottom:none;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;font-weight:500;background:white;color:#1a2744;white-space:nowrap;}
.ptab.active{background:#1a2744;color:white;}
.poltabs{display:flex;gap:4px;padding:10px 14px;background:#f8f7f4;border-bottom:1px solid #ddd8cc;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.poltab{padding:5px 14px;border:1px solid #ddd8cc;border-radius:20px;cursor:pointer;font-size:12px;background:white;color:#1a2744;white-space:nowrap;}
.poltab.active{background:#1a2744;color:white;}
.rg{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.rb{padding:4px 10px;border:1px solid #ddd8cc;border-radius:20px;cursor:pointer;font-size:12px;background:white;color:#1a2744;}
.rb.active{background:#1a2744;color:white;border-color:#1a2744;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#1a2744;color:white;padding:6px 8px;text-align:left;font-weight:500;white-space:nowrap;}
td{padding:5px 8px;border-bottom:1px solid #ddd8cc;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
table.kanyu{table-layout:fixed;width:100%;}
table.kanyu th,table.kanyu td{border:1px solid #ccc;text-align:center;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;padding:2px 5px;line-height:1.3;}
table.kanyu td:first-child,table.kanyu th:first-child{text-align:center;}
table.cmpct td,table.cmpct th{padding:2px 4px;}
table.cmpct td:first-child,table.cmpct th:first-child{text-align:left;}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cam{padding:12px;background:#f0f4ff;border-radius:8px;margin-bottom:12px;}
.cbox{border-top:2px solid #c9a84c;background:white;}
.chdr{background:#c9a84c;color:#1a2744;padding:8px 14px;font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.cbody{padding:12px;max-height:350px;overflow-y:auto;}
.cgrp{margin-bottom:10px;}
.cgtitle{font-size:12px;font-weight:700;color:#1a2744;border-bottom:1px solid #ddd8cc;padding-bottom:3px;margin-bottom:6px;}
.cfields{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.cf label{font-size:11px;color:#8a8a8a;}
.hi label{color:#856404 !important;font-weight:700 !important;}
.hi input{border-color:#f39c12 !important;background:#fffde7 !important;}
.cnote{padding:6px 12px;background:#fffde7;border-top:1px solid #ddd8cc;font-size:12px;color:#856404;}
.only-print{display:none;}
.tooltip-popup{position:fixed;bottom:20px;left:10px;right:10px;background:#1a2744;color:white;padding:12px 16px;border-radius:8px;font-size:12px;z-index:9999;line-height:1.6;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.kanyu:not(.cmpct) td, .kanyu:not(.cmpct) th, .kanyu:not(.cmpct) td span, .kanyu:not(.cmpct) th span, .kanyu:not(.cmpct) td b { font-size: 13px !important; }
/* 給付条件のコンパクト化を画面でも適用(印刷と同じ寸法で測定するため) */
body.pmatrix #print-area td, body.pmatrix #print-area th { padding: 1px 3px !important; line-height: 1.2 !important; }
body.pmatrix #print-area td div { min-height: 0 !important; padding: 2px 3px !important; }
body.pmatrix #print-area .mxdot { width: 9px !important; height: 9px !important; border: none !important; box-shadow: none !important; }
body.pmatrix #print-area td { vertical-align: middle !important; }
body.pmatrix #print-area td > div { font-size: 13px !important; min-height: 0 !important; padding: 2px 3px !important; display: block !important; text-align: center !important; line-height: 1.25 !important; }
body.pmatrix #print-area td > div > div { min-height: 0 !important; padding: 1px !important; }
@media print {
.hdr, .tabs, .ptabs, .poltabs, .no-print { display: none !important; }
.only-print{ display:block !important; }
#app button { display: none !important; }
#app input, #app select, #app textarea { border: none !important; background: transparent !important; -webkit-appearance: none; appearance: none; padding: 0 2px !important; color: #000 !important; }
.tw { overflow: visible !important; }
div[style*="overflow-x"] { overflow: visible !important; }
table { page-break-inside: auto; }
/* 印刷で背景色・お金マークの色が消えないようにする（最重要） */
*, *::before, *::after { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
body.psplit #app{ display:none !important; }
body.psplit #print-area{ display:block !important; }
body.psplit .hdr{ display:none !important; }
#print-area button{ display:none !important; }
#print-area .no-print{ display:none !important; }
/* グラフ等が用紙の境目で見切れないようにする */
canvas, .radar-card, .ref-table-wrap, .chart-block { page-break-inside: avoid; break-inside: avoid; }
/* 保障グラフ印刷を1枚(縦)に収める: 補足注は隠し、グラフ高さを縮め、レーダーを横並び・縮小 */
body.p_graph .gnote { display: none !important; }
body.p_graph .gchart { height: 150px !important; }
body.p_graph .radar-col { display: flex !important; flex-direction: row !important; flex-wrap: nowrap !important; gap: 10px !important; }
body.p_graph .radar-card { flex: 1 1 0 !important; min-width: 0 !important; margin-bottom: 0 !important; }
body.p_graph .radar-card canvas { width: 235px !important; height: 235px !important; }
/* グラフ・資産印刷時(body.pbig)は文字を一段大きく */
body.pbig #app, body.pbig #app * { font-size: 13.5px; }
body.pbig #app .pbig-title { font-size: 16px !important; }
/* 資産印刷はコンパクトに（1枚に収める） */
body.p_assets #app { font-size: 10px !important; }
body.p_assets #app .sec { margin-bottom: 5px !important; }
body.p_assets #app .sec-hdr { padding: 2px 8px !important; font-size: 11px !important; }
body.p_assets #app .sec-body { padding: 5px 8px !important; }
body.p_assets #app table { font-size: 9.5px !important; }
body.p_assets #app td, body.p_assets #app th { padding: 1px 3px !important; line-height: 1.2 !important; }
body.p_assets #app canvas { max-height: 130px !important; }
/* 預貯金・負債を横1行にズラッと並べる */
body.p_assets #app .g4 { display: flex !important; flex-wrap: nowrap !important; gap: 6px !important; }
body.p_assets #app .g4 > * { flex: 1 1 0 !important; min-width: 0 !important; }
body.p_assets #app .g4 label, body.p_assets #app .g4 .lbl { font-size: 9px !important; }
/* 資産合計の3カードを半分の高さに */
body.p_assets #app .g3 > div { padding: 2px 6px !important; }
/* グラフ下の余白を詰める（コンテナを実際の描画高に合わせる） */
body.p_assets #app .sim-wrap { height: 140px !important; margin-top: 4px !important; }
body.p_assets #app .sim-wrap canvas { max-height: 132px !important; }
/* NISA/iDeCoを横1行で */
body.p_assets #app .ni-row { display: flex !important; flex-wrap: nowrap !important; gap: 10px !important; }
body.p_assets #app .ni-row > * { flex: 1 1 0 !important; min-width: 0 !important; }
/* 給付条件比較表を1枚に収める: 文字と余白を縮小 */
body.pmatrix #print-area td, body.pmatrix #print-area th { padding: 1px 3px !important; line-height: 1.2 !important; }
body.pmatrix #print-area td div { min-height: 0 !important; padding: 2px 3px !important; }
body.pmatrix #print-area .mxdot { width: 9px !important; height: 9px !important; border: none !important; box-shadow: none !important; }
/* 加入一覧印刷: 文字を大きめに（行は空行非表示で減っているので収まる） */
body.pkanyu #print-area .kanyu td, body.pkanyu #print-area .kanyu th { font-size: 17px !important; padding: 5px 8px !important; line-height: 1.45 !important; }
body.pkanyu #print-area .kanyu td span, body.pkanyu #print-area .kanyu th span, body.pkanyu #print-area .kanyu td b { font-size: 17px !important; }
body.pkanyu #print-area .kanyu th span[style*="15px"] { font-size: 18px !important; }
body.pkanyu #print-area .kanyu { width: 100% !important; table-layout: auto !important; }
body.pkanyu #print-area .tw { width: 100% !important; overflow: visible !important; }
body.pkanyu #print-area { width: 100% !important; }
/* 直接印刷(Ctrl+P)で加入一覧/提案一覧を横向き・1枚に収める（大きすぎ→2枚を防ぐ） */
body.pdirectkanyu .hdr, body.pdirectkanyu .tabs, body.pdirectkanyu .ptabs, body.pdirectkanyu .poltabs, body.pdirectkanyu .no-print { display:none !important; }
body.pdirectkanyu #app .kanyu { table-layout: fixed !important; width: 100% !important; }
body.pdirectkanyu #app .kanyu td, body.pdirectkanyu #app .kanyu th { font-size: 11px !important; padding: 2px 4px !important; line-height: 1.3 !important; }
body.pdirectkanyu #app .kanyu td span, body.pdirectkanyu #app .kanyu th span, body.pdirectkanyu #app .kanyu td b { font-size: 11px !important; }
body.pdirectkanyu #app .tw, body.pdirectkanyu #app div[style*="overflow"] { overflow: visible !important; }
/* 提案比較の印刷: 縦置き・複数グループを上から・読みやすいサイズ（縮小しない） */
body.ppropcmp #print-area .kanyu { width: 100% !important; table-layout: fixed !important; margin-left: 0 !important; }
body.ppropcmp #print-area .kanyu col:first-child { width: 0 !important; }
body.ppropcmp #print-area .kanyu col:nth-child(n+3) { width: auto !important; }
body.ppropcmp #print-area .kanyu td, body.ppropcmp #print-area .kanyu th { font-size: 13px !important; padding: 5px 6px !important; line-height: 1.5 !important; }
body.ppropcmp #print-area .kanyu td span, body.ppropcmp #print-area .kanyu th span, body.ppropcmp #print-area .kanyu td b { font-size: 13px !important; }
body.ppropcmp #print-area .kanyu td:first-child, body.ppropcmp #print-area .kanyu th:first-child { padding: 0 !important; border: none !important; }
body.ppropcmp #print-area .kanyu td:nth-child(2), body.ppropcmp #print-area .kanyu th:nth-child(2) { white-space: normal !important; word-break: break-word !important; overflow: visible !important; text-overflow: clip !important; }
body.ppropcmp #print-area .tw, body.ppropcmp #print-area div[style*="overflow"] { overflow: visible !important; }
@page { size: A4 landscape; margin: 8mm; }
}
#print-area { display: none; }
</style>

var CPROMPT="保険証券・設計書の画像から情報をJSONで正確に抽出してください。\n\n【最優先タスク：解約返戻金/積立金の表】\n画像に『解約返戻金』『解約返戻金額』『返戻率』『積立金額』などの、年齢別または経過年数別の数値の表・グラフがあれば、それを最優先で futureVals 配列に入れてください。\n- futureVals=[{age:年齢, paid:その時点の払込保険料累計, v3:解約返戻金額}, ...] の形\n- 年齢が無く『経過年数』なら、契約年齢＋経過年数で年齢に換算（不明なら経過年数をageに入れる）\n- 金額は万円（外貨建てなら原通貨のままの数値、例:ドルなら30000ではなく3など表記通り）\n- 払込累計が表に無ければ paid は省略可\n- v1,v5,v6 にも v3 と同じ値を入れる\n- 読み取れた行は全て入れる。表が読めたら必ずfutureValsに入れ、notesには書かない。\n★最重要の注意：futureValsには『解約返戻金』『積立金額』『返戻率』の表の値**だけ**を入れる。死亡保険金・死亡保障・基本保険金額などの保障額を解約返戻金と取り違えないこと。死亡保険金はdlAmountに入れ、futureValsには絶対に入れない。一般に、解約返戻金は契約初期は小さく年齢とともに増えていく（払込累計に近い）値であり、死亡保険金は契約時から大きく一定の値。表の見出しに『解約返戻金』『返戻金』『積立金』『返戻率』が無ければfutureValsは空にする（死亡保障の表を流用しない）。\n\n【重要ルール】\n1. JSONのみ返す（説明文不要）\n2. 見つからない項目はnull\n3. 金額は万円単位の数値（例:500万円→500）\n4. 先進医療特約の金額はadvancedMedicalAmountに入れる（c1stに入れない）\n5. がん診断給付金のみc1stに入れる\n6. 会社名は正確に読み取る\n\n【読み取り精度の厳守事項】\nA. 数字は1文字ずつ慎重に読む。0と6と8、1と7、3と8を取り違えないこと。\nB. 金額の単位を必ず確認する。「円」と「万円」「千円」を混同しない。日額は円、保険金や給付金は万円で記入する。\nC. はっきり読めない文字・数字は推測で埋めず、その項目はnullにする。\nD. 証券番号は記号・ハイフン・「第〜号」も含めて原文のまま正確に写す。\nE. 複数ページや表がある場合は全ページを突き合わせ、最新・正式な数値を優先する。\nF. チェック欄や特約あり/なしの表示を見て、true/falseを正しく判定する。空欄や取消線は付帯なしとみなす。\nG. かんぽ生命「新ながいきくん」等の◯倍型/2倍型終身：dlAmountは払込期間中の死亡保険金（基準保険金額×倍率＝図の大きい方、例500万）。dlReducedAmountに払込満了後の額（基準保険金額の20%＝図の小さい方、例100万）。保険期間は終身。\nH. 保険料払込免除が「不慮の事故により180日以内の身体障がい」「重度障がい」のみの場合は、ほぼ全保険共通の標準免除なのでpremExemptTypeは「accident」にする（がん/3大/就業不能等の特約免除ではない）。\nI. かんぽ「無配当疾病傷害入院特約」「無配当傷害入院特約」の入院保険金額（日額）はhospDailyに入れる。\nJ. かんぽ「新ながいきくん おたのしみ型」：終身保険。dlAmount=払込期間中の死亡保険金、dlReducedAmount=払込満了後に残る終身死亡保険金（基準保険金額の20%＝払込中の約1/5）。さらに生存保険金（おたのしみ）は払込満了年齢から5年ごとに計4回、各回が基準保険金額の20%を受け取るので、celebAmount=その1回分の額、celebInterval=5、celebStartAge=払込満了年齢、celebEndAge=払込満了年齢+15に入れる。\nK. 法人・団体契約の判定：ご契約者が株式会社/有限会社/合同会社/医療法人/◯◯会社などの法人名、または団体名（◯◯会議所・◯◯組合・共済会等）で、被保険者(個人名)と異なる場合は法人/団体契約。isCorp=true、corpNameに契約者の法人名を入れる。給付金受取人が法人や、払込経路が団体・集団なのも法人契約の有力な手がかり。\nL. 「特定疾患給付特約」「特定疾病保険金」「3大疾病特約」など特定の病気で一時金が出る特約は bigOn=true とし、金額(万円)を h1st と b1st（がんも対象なら c1st も）に入れる。さらにその特約が◯歳満了（例:80歳満了/80歳払）で主契約(終身等)より早く終わる場合は bigEndAge にその満了年齢を入れる。主契約の補足『主契約死亡保険金：入院日額×N』のような記載があれば、死亡保険金(dlAmount,万円)＝入院日額×N÷10000 として拾う。\nM. がん保険・がん特約の各給付は対応項目へ：がん診断一時金=c1st、上皮内がん診断額=cInSitu、がん入院日額(円)=cancerHosp、がん手術=cancerSurg、抗がん剤/化学療法(1回)=cancerChemo、放射線治療=cancerRadiation、がん通院/治療通院(円)=cancerOut2、がん治療月額=cancerMonthly。がんのみの保険料免除はpremExemptType=cancer。\nN. メットライフ「ライフインベスト アドバンス」等の『災害保障期間付変額保険（有期型）』：insType=災害保障期間付変額保険。当初◯年（第1保険期間）は死亡・高度障害保障を抑制し災害死亡・災害高度障害のみ→disasterPeriodYearsにその年数(例10)、災害死亡保険金額をdisasterDeathに入れる。第2保険期間の死亡・高度障害保険金＝基本保険金額をdlAmountに。介護給付特則ありなら所定の要介護でcareLump/careMonthlyに介護保険金額。満期時生存で満期保険金(変額)＝満期・積立の年齢別推移表はfutureVals(v1=-3%,v3=0%,v5=3%,v6=6%)に、満期保険金額はrefundVal・refundAgeにも入れる。運用実績の想定は年6/3/0/-3%。\nO. 変額個人年金・変額年金保険：insType=変額個人年金保険。年金開始年齢=pensionStartAge、受取期間(年)=pensionYears、年金年額=annualPension(万円。何%時の値か注記)。設計書に『年金受取総額』『年金累計額』が運用率別(-3/0/3/6%)で載っていれば pensionTotals:{v1:-3%時,v3:0%時,v5:3%時,v6:6%時}(万円) に入れる。年金開始前の積立金/解約返戻金の推移はfutureValsに。\nP. 介護給付が『年額』で書かれている場合（介護年金◯◯万円/年など）は、月額に換算して careMonthly=年額÷12(万円) に入れる（careMonthlyは常に月額）。介護一時金はcareLump。\n\n【フィールド一覧】\ncompany:保険会社名（例:第一ネオ生命・SOMPOひまわり生命等）\ninsType:保険種類（医療保険/がん保険/終身保険/定期保険/変額終身保険/個人年金保険等）\npolicyNo:証券番号\ninsuredName:被保険者名（保障の対象者。契約者と別の場合に記載。同じか不明ならnull）\ncontractDate:契約日YYYY-MM-DD\ndeathType:死亡保障タイプ none/lump/annuity/both\ndlAmount:死亡保険金（万円）\ndlPeriodType:保険期間 終身/歳満了/年更新/更新後終身\ndlPeriodEnd:満了年齢または更新終了年齢\ndlPayType:払込期間 終身払/60歳払済/65歳払済/70歳払済/更新型/保険期間と同じ\ndlPayEnd:払込満了年齢\ndlReducedAmount:払込満了後の死亡保険金（万円）。5倍型/2倍型終身や逓減定期付き等で払込満了後に金額が下がる場合のみ記入（かんぽ「新ながいき」5倍型/2倍型は基準保険金額の20%＝倍率前の額）。下がらない通常終身は0\nhospDaily:入院日額（円）\nhospLimit:入院支払限度（例:60日/120日/無制限）\nhospLumpIn:入院一時金（万円）※入院した時に一時金として支払われるもの\nhospLumpOut:退院一時金（万円）※退院時に支払われるもの\nsurgInp:手術給付金・入院時（万円。固定額のとき）\nsurgInMode:入院時の手術給付金が術式により倍率変動（入院日額の5/10/20/40倍など複数倍率）ならtier、固定額ならnull\nsurgOutMode:外来手術が同様に術式により倍率変動ならtier、固定額ならnull\nadvancedMedical:先進医療特約 true/false\nadvancedMedicalAmount:先進医療給付金の上限（万円）\ncancerOn:がん特約 true/false\nc1st:がん診断給付金1回目（万円）※がんと診断された時の一時金のみ\nc2nd:がん診断給付金2回目以降（万円）\ncancerHosp:がん入院日額（円）\ncancerSurg:がん手術給付金（万円）\ncInSitu:上皮内がん（上皮内新生物）と診断された場合のがん診断給付金（万円）。悪性新生物と別に上皮内は減額される場合の額\ncancerChemo:がん化学療法・抗がん剤治療給付金の1回あたり額（万円。月1回など）\ncancerRadiation:がん放射線治療給付金（万円）\ncancerOut:がん通院日額（円）\nbigOn:3大疾病/8大疾病特約 true/false\nbigCount:3大疾病/7大疾病/8大疾病\nh1st:心疾患給付金（万円）\nhCond:心疾患要件 A:60日所定/B:入院10日以上/C:1泊入院\nb1st:脳血管疾患給付金（万円）\nbCond:脳血管要件 A:60日所定/B:入院10日以上/C:1泊入院\nbigEndAge:3大疾病/特定疾患給付特約が終身でなく◯歳満了の場合の満了年齢（例:80歳満了なら80）。終身・記載なしは0\ndisType:就業不能 none/lump/monthly/both\ndisMonthly:就業不能月額（万円）\ncareType:介護 none/lump/monthly/both\ncareLump:介護一時金（万円）\ncareMonthly:介護月額（万円）\noutType:通院特約 none/daily/monthly（通院給付金があればdaily、月額ならmonthly）\noutAmount:通院給付金の日額または月額（円。通院日額5000円ならoutType=daily,outAmount=5000）\nsurgOut:外来手術給付金（万円）\ninjuryAmount:傷害・ケガ給付金（万円）\npremUnit:払込方法 円/月または円/年\npremAmount:保険料数値\npremExemptType:免除条件 none/cancer/3big/5big/8big/dis/care/death/multi\npremExemptDetail:免除条件の詳細説明\nisCorp:法人契約ならtrue。契約者(ご契約者)が株式会社・有限会社・合同会社・医療法人・社団/財団法人・◯◯会社などの法人名、または団体名(◯◯会議所・◯◯組合等)で被保険者と異なる場合はtrue\ncorpName:法人契約のときの契約者(法人)の名称\npayRoute:払込経路。クレジット/口座/振込/団体 のいずれか（払込経路が団体・集団なら団体）\ncurrentVal:現在の積立金額（万円）\nfutureVals:将来予測テーブル配列（各要素:{age:年齢,paid:払込保険料累計,v1:-3%,v3:0%,v5:3%,v6:6%}）。★変額保険は運用率別(-3%/0%/3%/6%の4パターン)の予測額を各列に入れる（v1=-3%,v3=0%,v5=3%,v6=6%）。★円建て終身・養老・ドル建て終身などで『解約返戻金の推移表』『年齢別の解約返戻金』『返戻率の表』がある場合も、必ずこのfutureValsに入れること。その場合は運用率の区別が無いので、各年齢の解約返戻金額（万円。外貨なら原通貨の数値）を v3 に入れ、v1・v5・v6にも同じ値を入れる。表に払込保険料累計（既払込保険料）の列があれば paid に入れる。返戻率(%)しか書かれていない場合は、払込保険料累計×返戻率/100 で金額に換算して入れる（換算できなければ返戻率の数値をそのまま入れる）。年齢が書かれず『経過年数』の場合は、契約日や現在年齢から年齢に換算する。返戻金表は読み取れた行を全て入れる。\nannualPension:年金年額（外貨は原通貨の数値）\npensionStartAge:年金開始年齢\npensionYears:受取期間年\ncurrency:通貨 JPY/USD/EUR/AUD\nexchangeRate:為替レート\nrefundVal:生存還付金（万円）\nrefundAge:還付金受取年齢\ncelebAmount:〇年毎の祝金・生存給付金の1回あたりの額（万円）。『○年ごとに祝金』『健康祝金』『生存給付金（定期）』があれば入れる\ncelebInterval:祝金を受け取る間隔（何年ごと。例:5年ごとなら5）\ncelebStartAge:祝金の受取開始年齢（不明なら契約年齢＋間隔）\ncelebEndAge:祝金の受取終了年齢（不明なら保険期間満了年齢）\nrenewals:更新後保険料テーブル配列（各要素:{age:年齢,prem:月額保険料}）\nnotes:対応する項目があるものは必ずその項目へ。notesには対応項目の無い事項だけ簡潔に書く。\n\n【特約の振り分け（ (function(){

function startApp(){
function doInit(){
var list=listCustomers();saveCustomerList(list);render();
// 状態バナーを表示
setTimeout(function(){
var banner=document.createElement("div");
banner.style.cssText="position:fixed;bottom:10px;left:10px;right:10px;padding:10px;border-radius:8px;font-size:12px;font-weight:700;z-index:9999;text-align:center;";
if(window.storage&&window.storage.set){
banner.style.background="#7c3aed";banner.style.color="white";
banner.textContent="☁ 同期中...";
document.body.appendChild(banner);
// stateオブジェクトから直接保存（_cache不要）
var custs=listCustomers();
var cl=JSON.stringify(custs);
window.storage.set("ins_customer_list",cl).catch(function(){});
window.storage.set("kudo_current_customer",currentCustomerId||"kudo").catch(function(){});
// 現在の顧客データをsaveStateと同じ形式で保存
var origId=currentCustomerId;
var total=custs.length;var done2=0;
custs.forEach(function(c){
// 各顧客のデータを読み込んで保存
var saved=storageGet("ins_customer_"+c.id);
if(!saved){
// _cacheにない場合はlocalStorageから直接読む
try{saved=window.localStorage&&window.localStorage.getItem("ins_customer_"+c.id);}catch(e){}
}
var finish=function(){
done2++;
banner.textContent="☁ "+done2+"/"+total+"件完了";
if(done2===total){
banner.style.background="#27ae60";
setTimeout(function(){banner.remove();},4000);
}
};
if(saved){
window.storage.set("ins_customer_"+c.id,saved).then(finish).catch(finish);
} else {finish();}
});
} else {
// window.storage無し(GitHub Pages等)＝ローカル保存のみ。バナーは出さない。
}
},1000);
if(window.storage&&window.storage.set){
setTimeout(function(){
// 全顧客の証券データを個別にwindow.storageに保存
var custs=listCustomers();
var cnt=0;
// まず顧客リストを保存
var cl=storageGet("ins_customer_list");
if(cl){window.storage.set("ins_customer_list",cl).catch(function(){});}
window.storage.set("kudo_current_customer",currentCustomerId||"kudo").catch(function(){});
// 各顧客のデータを保存（saveStateを利用）
var origId=currentCustomerId;
custs.forEach(function(c){
// その顧客に切り替えてstateを保存
currentCustomerId=c.id;
var saved=storageGet(getCustomerKey());
if(saved){
window.storage.set(getCustomerKey(),saved).then(function(){
cnt++;
var si=document.getElementById("save-ind");
if(si){si.textContent="☁"+cnt+"/"+custs.length+"同期";si.style.color="#7c3aed";}
}).catch(function(){});
}
});
currentCustomerId=origId;
},1500);
}
}
function restoreAndInit(data){
if(data){Object.keys(data).forEach(function(k){try{storageSet(k,data[k]);}catch(e){}});}
state=loadState();
doInit();
// データ読込完了後に全データをwindow.storageに再保存
if(window.storage&&window.storage.set&&data&&Object.keys(data).length>0){
var keys=Object.keys(data);
var saved=0;
keys.forEach(function(k){
window.storage.set(k,data[k]).then(function(){
saved++;
if(saved===keys.length){
var si=document.getElementById("save-ind");
if(si){si.textContent="☁"+saved+"件同期";si.style.color="#7c3aed";}
}
}).catch(function(){saved++;});
});
}
}
try{
if(window.storage&&typeof window.storage.list==="function"){
Promise.resolve(window.storage.list()).then(function(kr){
var ks=(kr&&kr.keys)||[];
var ik=ks.filter(function(k){return k.indexOf("ins_")==0||k.indexOf("kudo_")==0;});
if(ik.length===0){return Promise.resolve(window.storage.get("hoken_backup")).then(function(r){restoreAndInit(r&&r.value?JSON.parse(r.value):null);});}
return Promise.all(ik.map(function(k){return Promise.resolve(window.storage.get(k));})).then(function(rs){var m={};rs.forEach(function(r,i){if(r&&r.value!==undefined)m[ik[i]]=r.value;});restoreAndInit(Object.keys(m).length?m:null);});
}).catch(function(){doInit();});
} else if(window.storage&&typeof window.storage.get==="function"){
var storagePromise;
try{storagePromise=Promise.resolve(window.storage.get("hoken_backup"));}catch(e){storagePromise=null;}
if(storagePromise){
storagePromise.then(function(result){
try{
if(result&&result.value){
try{
var data=JSON.parse(result.value);
Object.keys(data).forEach(function(k){
try{storageSet(k,data[k]);}catch(e){}
});
state=loadState();
}catch(e){}
}
}catch(e){}
doInit();
}).catch(function(){doInit();});
} else {doInit();}
} else {doInit();}
}catch(e){doInit();}
} // end startApp

      if(r&&r.data&&r.data.session&&r.data.session.user){
        sbUser=r.data.session.user;SYNC_ON=true;
        /* 起動時のクラウド自動取り込みを無効化（localStorageを正とし、再読込でローカルデータが空クラウドで上書きされるのを防止） */
        try{await sbLoadApiKey();}catch(e){}
        startApp();
      }else{
        showLogin();
      }
    }).catch(function(){showLogin();});
  }else{
    showLogin();
  }
})();
})();
