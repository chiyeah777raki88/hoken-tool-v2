<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>将来予測グラフ プロトタイプ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#1a2744; --paid:#9aa3b2; --loss:#e2574c; --gain:#1f9d6b;
    --r3:#3a6ea5; --r5:#c9962e; --r6:#a14d8c; --grid:#e8ebf1;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:#eef1f6;color:var(--ink);padding:14px;}
  .card{background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:14px;max-width:720px;margin:0 auto 14px;}
  h2{font-size:15px;margin:0 0 2px;}
  .sub{font-size:12px;color:#8089a0;margin:0 0 12px;}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
  .seg{display:inline-flex;border:1px solid #cbd2e0;border-radius:8px;overflow:hidden;}
  .seg button{border:0;background:#fff;padding:6px 12px;font-size:13px;color:#55607a;cursor:pointer;}
  .seg button.on{background:var(--ink);color:#fff;font-weight:700;}
  .chartbox{position:relative;height:340px;}
  /* 損益サマリー帯 */
  .summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
  .stat{padding:10px 12px;border-radius:8px;background:#f6f8fb;border-left:4px solid var(--ink);}
  .stat .lab{font-size:11px;color:#8089a0;}
  .stat .val{font-size:18px;font-weight:700;margin-top:2px;}
  .stat.cross{border-left-color:var(--gain);}
  .stat.cross .val{color:var(--gain);}
  .legend-note{font-size:11px;color:#8089a0;margin-top:10px;line-height:1.6;}
  .cur{font-size:12px;color:#55607a;margin-left:auto;display:flex;align-items:center;gap:6px;}
</style>
</head>
<body>
<div class="card">
  <h2>将来予測（解約返戻金 × 払込額）</h2>
  <p class="sub">変額終身保険・40歳契約・月2万円 ／ サンプルデータ</p>

  <div class="controls">
    <div class="seg" id="rateSeg">
      <button data-r="min">最低保証</button>
      <button data-r="3" class="on">3%</button>
      <button data-r="5">5%</button>
      <button data-r="6">6%</button>
    </div>
    <div class="cur">
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
        <input type="checkbox" id="cmpAll"> 全運用率を重ねる
      </label>
    </div>
  </div>

  <div class="chartbox"><canvas id="chart"></canvas></div>

  <div class="summary" id="summary"></div>
  <p class="legend-note">グレーの面が払込累計（払ったお金）。色の線が解約返戻金。線がグレーを上回った年齢が「元本超え（損益分岐）」です。それより前は解約すると元本割れ。</p>
</div>

<script>
// ===== サンプルデータ（v2の futureVals 相当）=====
// age:年齢, paid:払込累計(万円), min/v3/v5/v6:各運用率の返戻金(万円)
var DATA=[
  {age:45, paid:120, min:96,  v3:110, v5:118, v6:124},
  {age:50, paid:240, min:206, v3:238, v5:262, v6:280},
  {age:55, paid:360, min:320, v3:378, v5:430, v6:470},
  {age:60, paid:480, min:438, v3:530, v5:620, v6:690},
  {age:65, paid:480, min:455, v3:610, v5:760, v6:880},
  {age:70, paid:480, min:472, v3:700, v5:930, v6:1120},
  {age:75, paid:480, min:488, v3:805, v5:1140,v6:1430},
  {age:80, paid:480, min:505, v3:925, v5:1400,v6:1830}
];
var RATE_META={min:{key:"min",label:"最低保証",color:"#7b8496"},"3":{key:"v3",label:"3%",color:"#3a6ea5"},"5":{key:"v5",label:"5%",color:"#c9962e"},"6":{key:"v6",label:"6%",color:"#a14d8c"}};
var curRate="3", cmpAll=false, chart=null;

function valKey(r){return RATE_META[r].key;}

// 損益分岐（線がpaidを上回る最初の年齢）を線形補間で求める
function crossPoint(key){
  for(var i=1;i<DATA.length;i++){
    var p0=DATA[i-1], p1=DATA[i];
    var d0=p0[key]-p0.paid, d1=p1[key]-p1.paid;
    if(d0<0 && d1>=0){
      var t=d0/(d0-d1);
      var age=p0.age+t*(p1.age-p0.age);
      return Math.round(age*10)/10;
    }
    if(i===1 && d0>=0) return DATA[0].age; // 最初から超えている
  }
  return null;
}

function buildDatasets(){
  var labels=DATA.map(function(d){return d.age+"歳";});
  var ds=[];
  // 払込累計（面）
  ds.push({
    type:"line", label:"払込累計", data:DATA.map(function(d){return d.paid;}),
    borderColor:"#9aa3b2", backgroundColor:"rgba(154,163,178,0.18)",
    borderWidth:1.5, borderDash:[5,4], fill:true, pointRadius:0, tension:0.2, order:10
  });
  var rates= cmpAll ? ["min","3","5","6"] : [curRate];
  rates.forEach(function(r){
    var m=RATE_META[r], key=m.key;
    ds.push({
      type:"line", label:m.label+"（返戻金）", data:DATA.map(function(d){return d[key];}),
      borderColor:m.color, backgroundColor:m.color,
      borderWidth:3, fill:false, pointRadius:3, pointHoverRadius:5, tension:0.25, order:1
    });
  });
  return {labels:labels, datasets:ds};
}

// 損益分岐の縦線＋ラベルを描くプラグイン
var crossPlugin={
  id:"crossMarker",
  afterDraw:function(c){
    if(cmpAll) return; // 重ね表示時は単一分岐線は出さない
    var key=valKey(curRate);
    var age=crossPoint(key);
    if(age==null) return;
    var xScale=c.scales.x, yScale=c.scales.y, ctx=c.ctx;
    // ageに対応するx座標（ラベル間を線形補間）
    var idx=0; for(var i=0;i<DATA.length;i++){ if(DATA[i].age<=age) idx=i; }
    var x;
    if(idx<DATA.length-1){
      var a0=DATA[idx].age, a1=DATA[idx+1].age;
      var x0=xScale.getPixelForValue(idx), x1=xScale.getPixelForValue(idx+1);
      x=x0+(x1-x0)*((age-a0)/(a1-a0));
    } else { x=xScale.getPixelForValue(idx); }
    var top=yScale.top, bot=yScale.bottom;
    ctx.save();
    ctx.strokeStyle="#1f9d6b"; ctx.lineWidth=2; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(x,top); ctx.lineTo(x,bot); ctx.stroke();
    ctx.setLineDash([]);
    // ラベル
    var txt="元本超え "+age+"歳";
    ctx.font="700 12px -apple-system,sans-serif";
    var w=ctx.measureText(txt).width+14;
    var lx=Math.min(Math.max(x-w/2,top?2:2), c.width-w-2);
    var ly=top+6;
    ctx.fillStyle="#1f9d6b";
    ctx.beginPath(); ctx.roundRect(lx,ly,w,20,5); ctx.fill();
    ctx.fillStyle="#fff"; ctx.textBaseline="middle"; ctx.textAlign="center";
    ctx.fillText(txt,lx+w/2,ly+11);
    ctx.restore();
  }
};

function render(){
  var cfg=buildDatasets();
  if(chart) chart.destroy();
  chart=new Chart(document.getElementById("chart"),{
    data:cfg,
    plugins:[crossPlugin],
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{position:"top",labels:{font:{size:11},boxWidth:14,usePointStyle:true}},
        tooltip:{callbacks:{
          label:function(it){return it.dataset.label+": "+it.parsed.y.toLocaleString()+"万円";},
          afterbody:function(items){
            var d=DATA[items[0].dataIndex];
            var key=valKey(curRate);
            if(cmpAll) return "";
            var diff=d[key]-d.paid;
            var rate=d.paid>0?Math.round(d[key]/d.paid*1000)/10:0;
            return ["返戻率: "+rate+"%", (diff>=0?"＋":"")+diff.toLocaleString()+"万円"];
          }
        }}
      },
      scales:{
        x:{grid:{color:"#eef1f6"},ticks:{font:{size:11}}},
        y:{grid:{color:"#eef1f6"},ticks:{font:{size:10},callback:function(v){return v.toLocaleString();}},title:{display:true,text:"万円",font:{size:10},color:"#8089a0"}}
      }
    }
  });
  renderSummary();
}

function renderSummary(){
  var box=document.getElementById("summary");
  box.innerHTML="";
  var key=valKey(curRate);
  var last=DATA[DATA.length-1];
  var cross=crossPoint(key);
  var paidTotal=Math.max.apply(null,DATA.map(function(d){return d.paid;}));
  var finalV=last[key], finalRate=Math.round(finalV/last.paid*1000)/10;
  function stat(lab,val,cls){var d=document.createElement("div");d.className="stat"+(cls?" "+cls:"");d.innerHTML="<div class='lab'>"+lab+"</div><div class='val'>"+val+"</div>";return d;}
  if(!cmpAll){
    box.appendChild(stat("元本超え（損益分岐）", cross!=null?cross+"歳":"期間内に届かず","cross"));
    box.appendChild(stat(last.age+"歳の返戻金", finalV.toLocaleString()+"万円（返戻率"+finalRate+"%）"));
  }else{
    box.appendChild(stat("払込総額", paidTotal.toLocaleString()+"万円"));
    box.appendChild(stat("80歳 返戻金（3→6%）", DATA[DATA.length-1].v3+"〜"+DATA[DATA.length-1].v6+"万円"));
  }
}

// イベント
document.getElementById("rateSeg").addEventListener("click",function(e){
  var b=e.target.closest("button"); if(!b) return;
  curRate=b.getAttribute("data-r");
  [].forEach.call(this.querySelectorAll("button"),function(x){x.classList.toggle("on",x===b);});
  render();
});
document.getElementById("cmpAll").addEventListener("change",function(){
  cmpAll=this.checked;
  document.getElementById("rateSeg").style.opacity=cmpAll?0.4:1;
  document.getElementById("rateSeg").style.pointerEvents=cmpAll?"none":"auto";
  render();
});

render();
</script>
</body>
</html>
